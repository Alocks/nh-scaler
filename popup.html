<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    
    .popup-container {
      padding: 16px;
    }
    
    .title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .preset-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .preset-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .preset-option:hover {
      background: #e8e8e8;
    }
    
    .preset-option input[type="radio"] {
      margin: 0;
      cursor: pointer;
    }
    
    .preset-label {
      flex: 1;
      cursor: pointer;
      font-size: 13px;
    }
    
    .preset-desc {
      font-size: 11px;
      color: #666;
      margin-left: 24px;
    }
    
    .status {
      margin-top: 12px;
      padding: 8px;
      background: #fff;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
      border-left: 3px solid #4CAF50;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="title">
      <span>Upscaler Settings</span>
    </div>
    
    <div class="preset-options">
      <label class="preset-option">
        <input type="radio" name="preset" value="S">
        <span class="preset-label">Fast (SIMPLE_S)</span>
      </label>
      <div class="preset-desc">~0.1s per image</div>
      
      <label class="preset-option">
        <input type="radio" name="preset" value="M">
        <span class="preset-label">Balanced (SIMPLE_M)</span>
      </label>
      <div class="preset-desc">~0.2s per image</div>
      
      <label class="preset-option">
        <input type="radio" name="preset" value="L">
        <span class="preset-label">Quality (SIMPLE_L)</span>
      </label>
      <div class="preset-desc">~0.3s per image</div>
      
      <label class="preset-option">
        <input type="radio" name="preset" value="VL">
        <span class="preset-label">High Quality (SIMPLE_VL)</span>
      </label>
      <div class="preset-desc">~0.6s per image</div>
      
      <label class="preset-option">
        <input type="radio" name="preset" value="UL">
        <span class="preset-label">Best Quality (SIMPLE_UL)</span>
      </label>
      <div class="preset-desc">~1.6s+ per image</div>
    </div>
    
    <div class="status">
    Measurements done on an RTX4070TS
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
